---
services:
  nginx-proxy:
    image: nginx:latest
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - 443:443
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/certs:/etc/nginx/ssl:ro
    networks:
      - rproxy_network

networks:
  rproxy_network:
    external: true
