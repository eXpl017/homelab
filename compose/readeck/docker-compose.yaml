---
services:
  readeck:
    image: codeberg.org/readeck/readeck:latest
    container_name: readeck
    restart: unless-stopped
    volumes:
      - ./readeck-data:/readeck
    networks:
      - rproxy_network
    healthcheck:
      test: ["CMD", "/bin/readeck", "healthcheck", "-config", "config.toml"]
      interval: 30s
      timeout: 2s
      retries: 3


networks:
  rproxy_network:
    external: true
